# Generates the "snake eating your contribution graph" animation and
# publishes it to the `output` branch, where the README loads it from.
#
# Runs hourly, on push to main, and on demand.
# Note: GitHub delays scheduled runs under load — :17 past the hour avoids
# the top-of-hour rush, when jobs are most likely to be dropped entirely.
name: Generate Snake Animation

on:
  schedule:
    - cron: "17 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# If a scheduled run is still going when the next fires, drop the older one
# rather than queueing up a backlog.
concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Required by the keepalive step below, which commits to this repo.
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=#8A2BE2&color_dots=#0b0c2a,#4b0082,#8A2BE2,#c9a7ff,#ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub disables scheduled workflows after 60 days without repo activity.
      # This touches a file every ~50 days so the schedule never goes dormant.
      - name: Keepalive
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 50
